#info-panel * {
    box-sizing: border-box;
}

#info-panel ,  #general-info-panel{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #fff;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    border-radius: 12px;
    border: 1px solid #e6e6e6;
    color: #333;
    padding: 20px 25px;

    /* Positioning & Hiding */
    position: absolute;
    top: 20px;
    right: 20px;
    width: 320px;
    z-index: 10;
    
    /* Initially hidden */
    display: none;
}

#general-info-panel{
  left:  20px;
  right:  auto;
  display: block;
}

#info-panel h3 , #general-info-panel h3 {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 18px;
    color: #000;
    text-align: center;
}

#info-panel p , #general-info-panel p{
    margin: 0 0 10px;
    line-height: 1.6;
    font-size: 14px;
}

#info-panel strong , #general-info-panel strong{
    color: #555;
    font-weight: 600;
}

#close-button {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #f1f1f1;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    color: #555;
    font-size: 14px;
    line-height: 28px;
    text-align: center;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s;
}

#close-button:hover {
    background-color: #e6e6e6;
    color: #000;
}
  </style>

  container: document.getElementById('cy'),
  elements: data,
      style: [
        {
          selector: 'node.op',
          style: {
            'shape': 'roundrectangle',
            'background-color': 'red',
            'width': '120px',
            'height': '40px',
            'label': 'data(label)',
            'color': '#fff',
            'font-size': '12px',
            'text-valign': 'center',
            'text-halign': 'center',
            'border-radius': '5px',
          }
        },
        {
          selector: 'node.tensor',
          style: {
            'shape': 'roundrectangle',
            'background-color': '#3498db',
            'width': '200px',              
            'height': 'auto',              
            'label': 'data(label)',
            'color': 'white',
            'font-size': '13px',
            'text-wrap': 'wrap',
            'text-max-width': '180px',     
            'text-valign': 'center',
            'text-halign': 'center',
            'border-radius': '10px',
            'padding': '10px',
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 2,
            'line-color': '#ccc',
            'target-arrow-color': '#ccc',
            'target-arrow-shape': 'triangle'
          }
        }
      ],
      layout: {
        name: 'dagre', // Use dagre layout for DAGs
        rankDir: 'TB',
        nodeSep: 40,
        edgeSep: 10,
        rankSep: 50
      }
    });
// Get the panel elements
const infoPanel = document.getElementById('info-panel');
const infoContent = document.getElementById('info-content');
const generalContent = document.getElementById('general-info-content');
const closeButton = document.getElementById('close-button');

// --- Event Listeners ---

// Show panel on tensor node click
cyInstance.on('tap', 'node.tensor', function(evt){
  const node = evt.target;
  const nodeData = node.data();
  details = "";

  if (nodeData.details){
      for (const el in nodeData.details){
        details += `<p><strong>${el} : </strong> ${nodeData.details[el]}</p>`
      } 
  }

  infoContent.innerHTML = `
    <p><strong>ID:</strong> ${nodeData.id}</p>
    <p><strong>Label:</strong> ${nodeData.label}</p>
    <p><strong>Details:</strong> ${nodeData.details ? details : 'No additional details available.'}</p>
  `;
  
  // Instantly show the panel
  infoPanel.style.display = 'block';
});

// Hide panel when the close button is clicked
closeButton.addEventListener('click', function() {
  infoPanel.style.display = 'none';
});

// Hide the panel if you click on the graph background
cyInstance.on('tap', function(event){
  // Check if the tap was on the core canvas and not a node or edge
  if (event.target === cyInstance) {
    infoPanel.style.display = 'none';
  }
});



for (const el in general_info){
  generalContent.innerHTML += `<p><strong>${el} : </strong> ${general_info[el]}</p>`
}
